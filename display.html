<style>
  body { background-color: #16130b; color: #eae1d4; -webkit-font-smoothing: antialiased; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .luxury-shadow { box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); }
  .pulse-amber { box-shadow: 0 0 0 0 rgba(255, 191, 0, 0.7); animation: pulse-ring 2s infinite; }
  @keyframes pulse-ring {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 191, 0, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 191, 0, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 191, 0, 0); }
  }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  .animate-shimmer {
    background: linear-gradient(90deg, #d4af37 25%, #ffbf00 50%, #d4af37 75%);
    background-size: 200% 100%; animation: shimmer 3s infinite linear;
  }
  ::-webkit-scrollbar { display: none; }
  * { -ms-overflow-style: none; scrollbar-width: none; }
  body { min-height: max(884px, 100dvh); }

  .screen { display: none; animation: fadeIn 0.35s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .nav-item.is-active { color: #f2ca50; }
  .nav-item { cursor: pointer; }
</style>
